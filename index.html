<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>Leaderboards Ranking</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="styles/common.css">
  <script src="components/model-filter.js"></script>
  <script src="scripts/lb-config.js"></script>
  <script src="scripts/util.js"></script>
  <script src="scripts/tooltip.js"></script>
  <script src="scripts/viz-controls.js"></script>
  <script src="scripts/data-loader.js"></script>
  <script src="scripts/aggregation.js"></script>
  <style>
    .viz-grid {
      display: grid;
      grid-template-rows: auto 19fr 1fr;
      grid-template-columns: 1fr auto;
      height: 100vh;
      width: 100vw;
      box-sizing: border-box;
      padding-bottom: 8px;
    }

    #container1 {
      grid-row: 2;
      grid-column: 1 / span 2;
      display: flex;
      overflow: hidden;
      align-items: center;
      justify-content: center;
    }

    #footnote-container {
      grid-row: 3;
      grid-column: 1 / span 2;
      background: #f9fafc;
      padding: 6px 16px;
      font-size: clamp(10px, 1.4vw, 13px);
      color: #666;
      text-align: right;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      min-height: 50px;
      box-sizing: border-box;
      display: none;
    }

    #container1 .chart-wrapper {
      flex: 1 1 auto;
      display: flex;
      min-width: 0;
      height: 100%;
    }

    #container1 .chart-wrapper-inner {
      flex: 1 1 auto;
      display: flex;
      min-width: 0;
      height: 100%;
    }

    #chart {
      display: block;
      width: 100%;
      height: 100%;
    }

    #container2 {
      grid-row: 1;
      grid-column: 1 / span 2;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 24px 20px;
      position: relative;
    }

    .c2-controls {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 8px;
    }

    #container3 {
      display: none;
    }

    #container4 {
      display: none;
    }

    .viz-grid.with-logo #footnote-container {
      grid-column: 1;
    }

    .viz-grid.with-logo #container4 {
      display: flex;
      grid-row: 3;
      grid-column: 2;
      align-items: center;
      justify-content: flex-end;
      padding: 4px 16px 4px 0;
      overflow: hidden;
      min-width: 0;
      gap: 0;
    }

    .viz-grid.with-logo #container4 .logo {
      height: auto;
      max-height: 100%;
      width: auto;
    }

@media (max-height:500px),
    (max-width:640px) {
      .viz-grid {
        grid-template-rows: auto 1fr auto;
        grid-template-columns: 1fr;
        padding-bottom: 0px;
      }

      .viz-grid.display-mode-0 #container3,
      .viz-grid.display-mode-0 #container4 {
        display: none !important;
      }

      #container1 {
        grid-row: 2;
        grid-column: 1;
      }

      #container2 {
        grid-row: 1;
        grid-column: 1;
      }

      #footnote-container {
        grid-row: 3;
        grid-column: 1;
      }

      /* Source + logo: own row at bottom, side by side */
      .viz-grid.with-logo {
        grid-template-rows: auto 1fr auto auto;
        grid-template-columns: 1fr 1fr;
      }

      .viz-grid.with-logo #container2 {
        grid-column: 1 / span 2;
      }

      .viz-grid.with-logo #container1 {
        grid-column: 1 / span 2;
      }

      .viz-grid.with-logo #footnote-container {
        grid-row: 3;
        grid-column: 1 / span 2;
      }

      .viz-grid.with-logo #container3 {
        display: flex;
        grid-row: 4;
        grid-column: 1;
        align-items: center;
        padding: 4px 16px;
      }

      .viz-grid.with-logo #container4 {
        display: flex;
        grid-row: 4;
        grid-column: 2;
        align-items: center;
        justify-content: flex-end;
        padding: 4px 16px 4px 0;
      }
    }

    @media (max-width:540px) {
      .viz-grid.display-mode-0 {
        grid-template-rows: 1fr !important;
      }

      .viz-grid.display-mode-0 #container2,
      .viz-grid.display-mode-0 #footnote-container {
        display: none !important;
      }

      .viz-grid.display-mode-0 #container1 {
        grid-row: 1 !important;
      }
    }
  </style>
</head>

<body>
  <div class="viz-grid">
    <div id="container2" class="container control-container">
      <div class="tabs-container">
        <div class="tab active" data-question="ALL">Overall</div>
        <div class="tab-separator"></div>
        <div class="tab" data-question="LMArena">LMArena</div>
        <div class="tab" data-question="Artificial Analysis">Artificial Analysis</div>
        <div class="tab" data-question="LiveBench">LiveBench</div>
        <div class="tab-indicator"></div>
      </div>
      <div class="c2-controls">
        <div style="display: flex; flex-direction: row; align-items: center; gap: 8px;">
          <div style="font-size: clamp(10px, 1.2vw, 12px); font-weight: 600; color: #666;">Models by Provider</div>
          <div class="selector-group">
            <button class="selector-button bop-btn active" data-bop="0">All</button>
            <button class="selector-button bop-btn" data-bop="1">Best</button>
          </div>
        </div>
        <div style="display: flex; flex-direction: row; align-items: center; gap: 8px;">
          <div style="font-size: clamp(10px, 1.2vw, 12px); font-weight: 600; color: #666;">Color by</div>
          <div class="selector-group">
            <button class="selector-button" data-palette="0">Org</button>
            <button class="selector-button" data-palette="1">Licensing</button>
            <button class="selector-button" data-palette="2">Country</button>
          </div>
        </div>
      </div>
    </div>
    <div id="container1" class="container chart-container">
      <div class="chart-wrapper">
        <div class="chart-wrapper-inner">
          <svg id="chart"></svg>
        </div>
      </div>
    </div>
    <div id="container3" class="container source-container">
      <div class="source-text">Source: <a href="https://aiworld.eu" target="_blank">AI World</a></div>
    </div>
    <div id="container4" class="container logo-container">
      <a href="https://aiworld.eu/" target="_blank" rel="noopener">
        <img src="https://aiworld.eu/logo-transparent.svg" class="logo" alt="AI World logo">
      </a>
    </div>
    <div id="footnote-container">
      Scores are normalized from three benchmarks (LMArena, Artificial Analysis, LiveBench). If a model is missing one
      benchmark, it is estimated as the average of the other two.
    </div>
  </div>
  <div id="tooltip"></div>
  <script>
    const tooltip = d3.select("#tooltip");
    const DATA_BASE = (LB.config && LB.config.dataBase) || ".";
    let rawData = [];
    let sourceData = null;
    let snapshotMode = false;
    let lastTrackedScores = {};
    let questions = [];
    let modelIcons = {};
    let modelColors = {};
    let modelToOs = {};
    let modelToLogo = {};
    let modelToOrg = {};
    let activeOsFilter = null;
    let modelToGeo = {};
    let modelToReleaseDate = {};
    let hiddenGeos = [];
    let questionAnswers = {};
    let active = { question: 'ALL' };
    let displayLimit = 30;
    let styleMode = 0;
    let paletteMode = 0;
    let modeParam = 0;
    let highlightMode = null;
    let highlightPaused = false;
    let highlightPauseTimeout = null;
    let bgColor = '#f9fafc';
    let idToColor = {};
    let idToOrg = {};
    const parseNum = LB.util.parseNum;
    const hexToRgb = LB.util.hexToRgb;
    const rgbToHex = LB.util.rgbToHex;
    const lighten = LB.util.lighten;
    const clampToDomain = LB.util.clampToDomain;
    function renderScoreCell(model, key, currentScore, formatter) {
      return LB.tooltip.renderScoreCell(model, key, currentScore, formatter, lastTrackedScores);
    }
    function assignColor(d) {
      const model = String(d.model || '').trim();
      const logo = String(d.logo || '').trim();
      if (paletteMode === 1) {
        const os = modelToOs[model] !== undefined ? modelToOs[model] : 0;
        modelColors[model] = os === 1 ? '#188ab2' : '#ef476f';
      } else if (paletteMode === 2) {
        const geo = modelToGeo[model] || 'Other';
        if (geo === 'US') modelColors[model] = '#ec787a';
        else if (geo === 'China') modelColors[model] = '#fadb56';
        else if (geo === 'France') modelColors[model] = '#5c5a74';
        else modelColors[model] = '#cccccc';
      } else if (logo && idToColor[logo]) {
        modelColors[model] = idToColor[logo];
      } else {
        modelColors[model] = '#9ca3af';
      }
    }
    function assignAllColors(updateKnownSourceModels) {
      rawData.forEach(d => assignColor(d));
      if (!sourceData) return;
      ['lma', 'aa', 'lb'].forEach(k => {
        const rows = sourceData[k];
        if (!Array.isArray(rows)) return;
        rows.forEach(r => {
          const id = String(r.id || '').trim();
          if (!id || (!updateKnownSourceModels && modelColors[id] !== undefined)) return;
          assignColor({ model: id, logo: r.logo || '' });
        });
      });
    }
    function load() {
      const query = LB.vizControls.readQuery({
        paletteDefault: paletteMode,
        paletteValues: [1, 2],
        sourceDefault: 'ALL',
        topDefault: displayLimit,
        styleDefault: styleMode,
        styleValues: [1],
        colorDefault: bgColor,
        bopDefault: modeParam,
        displayDefault: 0
      });
      const snapshotParam = query.snapshot;

      LB.loadData({ dataBase: DATA_BASE, snapshotParam }).then(state => {
        rawData = state.rawData;
        lastTrackedScores = state.lastTrackedScores;
        modelToOs = state.modelToOs;
        modelToGeo = state.modelToGeo;
        modelToReleaseDate = state.modelToReleaseDate;
        modelToLogo = state.modelToLogo;
        modelToOrg = state.modelToOrg;
        modelIcons = state.modelIcons;
        idToColor = state.idToColor;
        idToOrg = state.idToOrg;
        sourceData = state.sourceData || null;
        snapshotMode = !!snapshotParam;

        paletteMode = query.palette;
        assignAllColors(false);

        questions = ['ALL', 'LMArena', 'Artificial Analysis', 'LiveBench'];
        active.question = query.source;
        LB.vizControls.setActiveTab(active.question);

        displayLimit = query.top;
        styleMode = query.style;
        if (query.highlight) {
          highlightMode = query.highlight;
          document.addEventListener('mousemove', pauseHighlight);
        }

        bgColor = query.color;
        modeParam = query.bop;
        LB.vizControls.applyPageChrome({ bgColor, logo: query.logo, displayMode: query.display });

        setupTabs();

        LB.vizControls.setupValueButtons({
          selector: '.bop-btn',
          attr: 'data-bop',
          value: modeParam,
          onChange: val => {
            modeParam = val;
            LB.vizControls.syncUrlFlag('bop', modeParam === 1);
            updateChart();
            updateFootnote();
          }
        });

        LB.vizControls.setupValueButtons({
          selector: '[data-palette]',
          attr: 'data-palette',
          value: paletteMode,
          onChange: val => {
            paletteMode = val;
            assignAllColors(true);
            if (window.ModelFilter) window.ModelFilter.refresh();
            updateChart();
            updateFootnote();
          }
        });

        if (window.ModelFilter) {
          window.ModelFilter.init({
            getModels: () => rawData
              .map(d => {
                const m = String(d.model || '').trim();
                return {
                  model: m,
                  name: String(d.name || '').trim(),
                  color: modelColors[m] || '#2756d3',
                  _rd: modelToReleaseDate[m] || null
                };
              })
              .sort((a, b) => {
                if (a._rd && b._rd) return b._rd - a._rd;
                if (a._rd) return -1;
                if (b._rd) return 1;
                return (a.name || a.model).localeCompare(b.name || b.model);
              }),
            onChange: () => { updateChart(); updateFootnote(); }
          });
        }

        createChart();
        updateFootnote();
      });
    }
    function setupTabs() {
      LB.vizControls.setupTabs({
        value: active.question,
        onChange: question => {
          active.question = question;
          updateChart();
          updateFootnote();
        }
      });
    }
    function updateFootnote() {
      LB.vizControls.renderFilterLegend({
        container: document.getElementById('footnote-container'),
        paletteMode,
        activeOsFilter,
        hiddenGeos,
        geoColors: { US: '#ec787a', China: '#fadb56', France: '#5c5a74' },
        onChange: state => {
          activeOsFilter = state.activeOsFilter;
          hiddenGeos = state.hiddenGeos;
          updateChart();
          updateFootnote();
        }
      });
    }
    function updateAnswerDisplay() { const answerEl = document.getElementById('correctAnswer'); const answerSection = document.getElementById('answerSection'); if (!answerEl || !answerSection) { return; } if (active.question === 'ALL') { answerSection.classList.add('hidden'); } else { answerEl.textContent = questionAnswers[active.question] || '-'; answerSection.classList.remove('hidden'); } }
    function getAggregated() {
      const aggregated = LB.aggregate({
        rawData,
        lastTrackedScores,
        modelToGeo,
        modelToOs,
        modelToLogo,
        active,
        hiddenGeos,
        activeOsFilter,
        modeParam,
        includeSegments: true,
        sourceData,
        snapshotMode,
        onMissingBaseline: () => {
          const chartEl = document.getElementById('chart');
          if (chartEl) chartEl.innerHTML = '<div style="padding:24px;color:#c00;font-weight:600;">Error: GPT-5 baseline data is missing from the scraping results.</div>';
        }
      });
      return aggregated.map(d => ({
        id: d.name || d.model,
        model: d.model,
        name: d.name,
        wins: d.score,
        ties: 0,
        total: d.score,
        logo: modelIcons[d.model] || '',
        color: modelColors[d.model] || '#9ca3af',
        lmaSegment: d.lmaSegment || 0,
        aaSegment: d.aaSegment || 0,
        lbSegment: d.lbSegment || 0,
        untracked: !!d.untracked
      }));
    }
    function getTop20() { return getAggregated().slice().sort((a, b) => b.total - a.total).slice(0, displayLimit); }
    function getXDomain() {
      const data = getTop20();
      const minScore = d3.min(data, d => d.total);
      const maxScore = d3.max(data, d => d.total);

      if (minScore == null || maxScore == null) { return [0, 1]; }

      if (active.question === 'ALL') {
        const lower = Math.max(0, minScore - 0.02);
        const upper = Math.min(1, maxScore + 0.02);
        return [lower, upper];
      }

      const range = maxScore - minScore;
      let padding;

      if (active.question === 'LMArena') {
        padding = Math.max(10, range * 0.10);
      } else {
        padding = Math.max(5, range * 0.10);
      }

      const lower = Math.max(0, minScore - padding);
      const upper = maxScore + padding;
      return [lower, upper];
    }
    function getValueFormatter() {
      if (active.question === 'ALL') { return d3.format('.3f'); }
      if (active.question === 'LiveBench') { return d3.format('.1f'); }
      return d3.format('.0f');
    }
    let chartState = { svg: null, g: null, x: null, y: null, yAxisGroup: null, xAxisGroup: null, bgLayer: null, rowBG: null, width: 0, height: 0, margin: null, barsWin: null, barsTie: null, barsTieOverlay: null, logos: null, sizeFactor: 1, axisFS: 12, valueFS: 12, sourceFS: 12, logoWH: 24, logoWidth: 24, logoSize: 24, padding: 16, xDomain: [0, 1], xMin: 0, xMax: 1 };
    function barPath(x0, x1, yCenter, h, opts) {
      const o = opts || {};
      const roundStart = o.roundStart !== false;
      const roundEnd = o.roundEnd !== false;
      const baseRadius = o.baseRadius || 4;
      const yTop = yCenter - h / 2;
      const yBot = yCenter + h / 2;
      const width = Math.max(0, x1 - x0);
      if (width <= 0) { return `M ${x0} ${yTop} L ${x0} ${yBot} L ${x0} ${yBot} Z`; }

      const radius = Math.min(baseRadius, h / 2, width / 2);
      const rStart = roundStart ? radius : 0;

      const useSlash = (styleMode === 1 && roundEnd);
      const rEnd = (!useSlash && roundEnd) ? radius : 0;

      let path = `M ${x0} ${yTop + rStart}`;

      if (rStart) { path += ` A ${rStart} ${rStart} 0 0 1 ${x0 + rStart} ${yTop}`; }
      else { path += ` L ${x0} ${yTop}`; }

      if (useSlash) {
        const slashW = h * 0.5;
        path += ` L ${x1} ${yTop}`;
        path += ` L ${x1 - slashW} ${yBot}`;
      } else {
        path += ` L ${x1 - rEnd} ${yTop}`;
        if (rEnd) { path += ` A ${rEnd} ${rEnd} 0 0 1 ${x1} ${yTop + rEnd}`; }
        else { path += ` L ${x1} ${yTop}`; }

        path += ` L ${x1} ${yBot - rEnd}`;
        if (rEnd) { path += ` A ${rEnd} ${rEnd} 0 0 1 ${x1 - rEnd} ${yBot}`; }
        else { path += ` L ${x1} ${yBot}`; }
      }

      path += ` L ${x0 + rStart} ${yBot}`;
      if (rStart) { path += ` A ${rStart} ${rStart} 0 0 1 ${x0} ${yBot - rStart}`; }
      else { path += ` L ${x0} ${yBot}`; }

      path += ' Z';
      return path;
    }
    function truncateAxisLabels(maxWidth) {
      if (!chartState.yAxisGroup) { return; }
      const untrackedSet = chartState.untrackedSet || null;
      chartState.yAxisGroup.selectAll('.tick').each(function (d) {
        const tick = d3.select(this);
        const text = tick.select('text');
        const full = String(d);
        const isThinking = full.includes('(Thinking)');
        const isPreview = full.includes('(Preview)') || full.includes('(Beta)');
        const isUntracked = !!(untrackedSet && untrackedSet.has(full));

        let baseText = full;
        if (isThinking) baseText = baseText.replace('(Thinking)', '');
        if (isPreview) baseText = baseText.replace('(Preview)', '').replace('(Beta)', '');
        baseText = baseText.trim();

        text.text(baseText);
        text.attr('dx', 0);
        text.style('font-style', isUntracked ? 'italic' : null);
        text.style('fill', isUntracked ? '#9ca3af' : null);
        let currentWidth = text.node().getComputedTextLength();

        let icons = [];
        if (isUntracked) icons.push('<span title="Untracked model" style="display:inline-block;width:13px;height:13px;border-radius:50%;background:#9ca3af;color:#fff;font-size:9px;font-weight:700;text-align:center;line-height:13px;">!</span>');
        if (isPreview) icons.push('<i class="fa-solid fa-flask fa-lg" style="color: rgb(84, 90, 160);" title="Preview model"></i>');

        let iconSpace = icons.length * 20;

        if (currentWidth + iconSpace > maxWidth) {
          let low = 0;
          let high = baseText.length;
          while (low < high) {
            const mid = Math.floor((low + high) / 2);
            text.text(baseText.slice(0, mid) + '…');
            if (text.node().getComputedTextLength() + iconSpace <= maxWidth) { low = mid + 1; }
            else { high = mid; }
          }
          const cut = Math.max(1, low - 1);
          baseText = baseText.slice(0, cut) + '…';
          text.text(baseText);
        }

        text.attr('data-full', full);
        let title = text.select('title');
        if (title.empty()) {
          text.append('title').text(full);
        } else {
          title.text(full);
        }

        tick.selectAll('foreignObject').remove();
        if (icons.length > 0) {
          text.attr('dx', -iconSpace - 4);
          tick.append('foreignObject')
            .attr('x', -9 - iconSpace)
            .attr('y', -8)
            .attr('width', iconSpace)
            .attr('height', 16)
            .style('pointer-events', 'none')
            .append('xhtml:div')
            .style('display', 'flex')
            .style('align-items', 'center')
            .style('justify-content', 'flex-start')
            .style('gap', '4px')
            .style('width', '100%')
            .style('height', '100%')
            .style('pointer-events', 'auto')
            .html(icons.join(''));
        }
      });
    }
    function getBarHeight(scaleBand, sizeFactor) { const bw = scaleBand.bandwidth(); const k = .95 + .03 * (sizeFactor || 1); return Math.max(10, bw * k); }
    function createColorPattern(defs, color) { const lightColor = lighten(color, .35); const patternId = 'crossPattern-' + color.replace('#', ''); if (defs.select('#' + patternId).empty()) { const pattern = defs.append('pattern').attr('id', patternId).attr('patternUnits', 'userSpaceOnUse').attr('width', 8).attr('height', 8); pattern.append('rect').attr('width', 8).attr('height', 8).attr('fill', lightColor); pattern.append('line').attr('x1', 0).attr('y1', 0).attr('x2', 8).attr('y2', 8).attr('stroke', color).attr('stroke-width', 1.5).attr('opacity', 0.6); pattern.append('line').attr('x1', 8).attr('y1', 0).attr('x2', 0).attr('y2', 8).attr('stroke', color).attr('stroke-width', 1.5).attr('opacity', 0.6); } return 'url(#' + patternId + ')'; }
    function computeFooterMargin(containerWidth, containerHeight, sizeFactor) { const compact = window.matchMedia('(max-height:500px), (max-width:640px)').matches; const minW = 320; const minH = 240; const thrW = 640; const thrH = 500; if (compact) { const tW = Math.max(0, Math.min(1, (containerWidth - minW) / (thrW - minW))); const tH = Math.max(0, Math.min(1, (containerHeight - minH) / (thrH - minH))); const t = Math.min(tW, tH); return Math.round(5 + (24 - 5) * t); } return Math.round(70 * sizeFactor); }
    function createChart() {
      const data = getTop20();
      d3.select('#chart').selectAll('*').remove();
      const c1 = document.getElementById('container1');
      const rect = c1 ? c1.getBoundingClientRect() : { width: window.innerWidth, height: window.innerHeight };
      const containerWidth = Math.max(320, rect.width);
      const isCompactWidth = containerWidth < 540;
      const containerHeight = Math.max(240, rect.height);
      const sizeFactor = Math.max(.6, Math.min(1.15, Math.min(containerWidth / 900, containerHeight / 650)));

      const BaseAxisFontSize = isCompactWidth ? 11 : 16;
      const MinAxisFontSize = isCompactWidth ? 9 : 12;

      let axisFS = Math.max(MinAxisFontSize, Math.round(BaseAxisFontSize * sizeFactor));
      const valueFS = Math.max(9, Math.round(12 * sizeFactor));
      const sourceFS = Math.max(9, Math.round(12 * sizeFactor));
      const logoWH = Math.max(10, Math.round(24 * sizeFactor));
      chartState.sizeFactor = sizeFactor;
      chartState.axisFS = axisFS;
      chartState.valueFS = valueFS;
      chartState.sourceFS = sourceFS;
      chartState.logoWH = logoWH;
      const responsiveRadius = 4;
      chartState.barRadius = responsiveRadius;
      const tempSvg = d3.select('body').append('svg').style('visibility', 'hidden');
      const tempText = tempSvg.append('text').style('font-size', BaseAxisFontSize + 'px').style('font-family', 'sans-serif');
      const allTop20 = getAggregated().slice(0, 1000).map(d => d.id);
      const uniqLabels = Array.from(new Set(allTop20));
      let maxLabelWidth = 0;
      uniqLabels.forEach(id => {
        tempText.text(id);
        const w = tempText.node().getBoundingClientRect().width;
        maxLabelWidth = Math.max(maxLabelWidth, w);
      });
      tempSvg.remove();

          };
        }),
        exit => exit.transition().duration(500).attr('opacity', 0).remove()
      );
      const logos = chartState.svg.select('g').selectAll('image.logo').data(data, d => d.id);
      logos.join(
        enter => enter.append('image').attr('class', 'logo').attr('x', d => x(clampValue(d.total)) + 6).attr('y', d => y(d.id) + (y.bandwidth() - logoSize) / 2).attr('width', logoSize).attr('height', logoSize).attr('href', d => d.logo).attr('xlink:href', d => d.logo).attr('opacity', 0).transition().duration(700).attr('opacity', 1),
        update => update.transition().duration(700).attr('x', d => x(clampValue(d.total)) + 6).attr('y', d => y(d.id) + (y.bandwidth() - logoSize) / 2).attr('href', d => d.logo).attr('xlink:href', d => d.logo).attr('width', logoSize).attr('height', logoSize),
        exit => exit.transition().duration(500).attr('opacity', 0).remove()
      );
      chartState.logos = chartState.svg.select('g').selectAll('image.logo');

      const overlay = chartState.svg.select('.highlight-overlay');
      if (overlay.node()) overlay.raise();
      if (chartState.yAxisGroup) chartState.yAxisGroup.raise();
      if (chartState.xAxisGroup) chartState.xAxisGroup.raise();

      const hoverSel = chartState.svg.select('g').selectAll('.bar-win,.bar-tie');
      hoverSel.on('mousemove', (event, d) => {
        if (highlightMode && !highlightPaused && d.id !== highlightMode) return;
        let html = '';
        if (active.question === 'ALL') {
          const rawEntry = rawData.find(r => String(r.model || '').trim() === d.model);
          const lmaScore = rawEntry ? parseNum(rawEntry.lma) : 0;
          const aaScore = rawEntry ? parseNum(rawEntry.aa) : 0;
          const lbScore = rawEntry ? parseNum(rawEntry.lb) : 0;

          const lmaCell = renderScoreCell(d.model, 'lma', lmaScore, v => Math.round(v));
          const aaCell = renderScoreCell(d.model, 'aa', aaScore, v => v.toFixed(1));
          const lbCell = renderScoreCell(d.model, 'lb', lbScore, v => v.toFixed(1));
          const anyUntracked = lmaCell.untracked || aaCell.untracked || lbCell.untracked;

          html = `<div style="text-align:center;margin-bottom:4px;"><b>${d.name || d.id}</b>${modelToOrg[d.model] ? '<br><span style="font-size:0.9em;">' + modelToOrg[d.model] + '</span>' : ''}</div>`;
          html += `<table style="width:100%;margin-top:4px;border-spacing:0;">`;
          html += `<tr><td style="text-align:left;padding:2px 8px 2px 0;">LMArena</td><td style="text-align:right;padding:2px 0;">${lmaCell.html}</td></tr>`;
          html += `<tr><td style="text-align:left;padding:2px 8px 2px 0;">Artificial Analysis</td><td style="text-align:right;padding:2px 0;">${aaCell.html}</td></tr>`;
          html += `<tr><td style="text-align:left;padding:2px 8px 2px 0;">LiveBench</td><td style="text-align:right;padding:2px 0;">${lbCell.html}</td></tr>`;
          html += `</table>`;
          if (anyUntracked) {
            html += `<div style="margin-top:6px;font-size:11px;color:#bbb;font-style:italic;text-align:center;">! Model stopped being tracked</div>`;
          }
        } else {
          const scoreHtml = d.untracked
            ? `<span style="color:#888;">${fmt(d.total)}</span> <span style="display:inline-block;width:13px;height:13px;border-radius:50%;background:#888;color:#fff;font-size:9px;font-weight:700;text-align:center;line-height:13px;vertical-align:middle;">!</span>`
            : fmt(d.total);
          html = `<div style="text-align:center;margin-bottom:4px;"><b>${d.name || d.id}</b>${modelToOrg[d.model] ? '<br><span style="font-size:0.9em;">' + modelToOrg[d.model] + '</span>' : ''}</div>`;
          html += `<table style="width:100%;margin-top:4px;border-spacing:0;">`;
          html += `<tr><td style="text-align:left;padding:2px 8px 2px 0;">${active.question}</td><td style="text-align:right;padding:2px 0;">${scoreHtml}</td></tr>`;
          html += `</table>`;
          if (d.untracked) {
            html += `<div style="margin-top:6px;font-size:11px;color:#bbb;font-style:italic;text-align:center;">! Untracked model</div>`;
          }
        }
        tooltip.html(html).style('opacity', 1);
        LB.tooltip.position(tooltip, event, { offsetY: -28 });
      }).on('mouseleave', () => { tooltip.style('opacity', 0); });
      updateHighlight(data, true);
    }
    let resizeTimeout;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimeout);
      resizeTimeout = setTimeout(() => { createChart(); }, 250);
    });
    load();
  </script>
</body>

</html>
