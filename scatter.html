<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>AI Capability over Time</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="styles/common.css">
    <script src="scripts/lb-config.js"></script>
    <script src="components/model-filter.js"></script>
    <script src="scripts/util.js"></script>
    <script src="scripts/tooltip.js"></script>
    <script src="scripts/viz-controls.js"></script>
    <script src="scripts/data-loader.js"></script>
    <script src="scripts/aggregation.js"></script>
    <style>
        .viz-grid {
            display: grid;
            grid-template-rows: auto 19fr 1fr;
            grid-template-columns: 1fr auto;
            height: 100vh;
            width: 100vw;
            box-sizing: border-box;
            padding-bottom: 8px;
        }

        #container1 {
            grid-row: 2;
            grid-column: 1 / span 2;
            display: flex;
            overflow: hidden;
            align-items: center;
            justify-content: center;
        }

        #footnote-container {
            grid-row: 3;
            grid-column: 1 / span 2;
            background: #f9fafc;
            padding: 6px 16px;
            font-size: clamp(10px, 1.4vw, 13px);
            color: #666;
            text-align: right;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            min-height: 50px;
            box-sizing: border-box;
            display: none;
        }

        #container1 .chart-wrapper {
            flex: 1 1 auto;
            display: flex;
            min-width: 0;
            height: 100%;
        }

        #container1 .chart-wrapper-inner {
            flex: 1 1 auto;
            display: flex;
            min-width: 0;
            height: 100%;
        }

        #chart {
            display: block;
            width: 100%;
            height: 100%;
        }

        #container2 {
            grid-row: 1;
            grid-column: 1 / span 2;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 24px 20px;
            position: relative;
        }

        .c2-controls {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 8px;
        }

        #container3 {
            display: none;
        }

        #container4 {
            display: none;
        }

        .viz-grid.with-logo #footnote-container {
            grid-column: 1;
        }

        .viz-grid.with-logo #container4 {
            display: flex;
            grid-row: 3;
            grid-column: 2;
            align-items: center;
            justify-content: flex-end;
            padding: 4px 16px 4px 0;
            overflow: hidden;
            min-width: 0;
            gap: 0;
        }

        .viz-grid.with-logo #container4 .logo {
            height: auto;
            max-height: 100%;
            width: auto;
        }

        .scatter-dot {
            transition: r 0.15s ease, stroke-width 0.15s ease;
        }

        .scatter-label {
            font-size: clamp(9px, 1.1vw, 12px);
            font-weight: 600;
            pointer-events: none;
            user-select: none;
        }

        .trendline {
            pointer-events: none;
            stroke-dasharray: 6 4;
            stroke-width: 2;
            fill: none;
            opacity: 0.85;
        }

        .quadrant-line {
            pointer-events: none;
            stroke: #94a3b8;
            stroke-width: 1.5;
            stroke-dasharray: 2 4;
            stroke-linecap: round;
            opacity: 0.7;
        }

        .selector-button[disabled] {
            opacity: 0.4;
            cursor: not-allowed;
            pointer-events: none;
        }

        .axis-grid line {
            stroke: #e5e7eb;
            stroke-dasharray: 2 3;
            shape-rendering: crispEdges;
        }

        .axis-grid path {
            stroke: none;
        }

        .chart-title {
            font-size: clamp(14px, 2vw, 22px);
            font-weight: 700;
            fill: #111;
        }

        .axis-label {
            font-size: clamp(10px, 1.2vw, 14px);
            font-weight: 600;
            fill: #333;
        }

        @media (max-height:500px),
        (max-width:640px) {
            .viz-grid {
                grid-template-rows: auto 1fr auto;
                grid-template-columns: 1fr;
                padding-bottom: 0px;
            }

            .viz-grid.display-mode-0 #container3,
            .viz-grid.display-mode-0 #container4 {
                display: none !important;
            }

            #container1 {
                grid-row: 2;
                grid-column: 1;
            }

            #container2 {
                grid-row: 1;
                grid-column: 1;
            }

            #footnote-container {
                grid-row: 3;
                grid-column: 1;
            }

            .viz-grid.with-logo {
                grid-template-rows: auto 1fr auto auto;
                grid-template-columns: 1fr 1fr;
            }

            .viz-grid.with-logo #container2 {
                grid-column: 1 / span 2;
            }

            .viz-grid.with-logo #container1 {
                grid-column: 1 / span 2;
            }

            .viz-grid.with-logo #footnote-container {
                grid-row: 3;
                grid-column: 1 / span 2;
            }

            .viz-grid.with-logo #container3 {
                display: flex;
                grid-row: 4;
                grid-column: 1;
                align-items: center;
                padding: 4px 16px;
            }

            .viz-grid.with-logo #container4 {
                display: flex;
                grid-row: 4;
                grid-column: 2;
                align-items: center;
                justify-content: flex-end;
                padding: 4px 16px 4px 0;
            }
        }

        @media (max-width:540px) {
            .viz-grid.display-mode-0 {
                grid-template-rows: 1fr !important;
            }

            .viz-grid.display-mode-0 #container2,
            .viz-grid.display-mode-0 #footnote-container {
                display: none !important;
            }

            .viz-grid.display-mode-0 #container1 {
                grid-row: 1 !important;
            }
        }
    </style>
</head>

<body>
    <div class="viz-grid">
        <div id="container2" class="container control-container">
            <div class="tabs-container">
                <div class="tab active" data-question="ALL">Overall</div>
                <div class="tab-separator"></div>
                <div class="tab" data-question="LMArena">LMArena</div>
                <div class="tab" data-question="Artificial Analysis">Artificial Analysis</div>
                <div class="tab" data-question="LiveBench">LiveBench</div>
                <div class="tab-indicator"></div>
            </div>
            <div class="c2-controls">
                <div style="display: flex; flex-direction: row; align-items: center; gap: 16px;">
                    <div style="display: flex; flex-direction: row; align-items: center; gap: 8px;">
                        <div style="font-size: clamp(10px, 1.2vw, 12px); font-weight: 600; color: #666;">X axis</div>
                        <div class="selector-group">
                            <button class="selector-button x-btn active" data-x="0">Date</button>
                            <button class="selector-button x-btn" data-x="1">Cost</button>
                        </div>
                    </div>
                    <div id="trend-control" style="display: flex; flex-direction: row; align-items: center; gap: 8px;">
                        <div style="font-size: clamp(10px, 1.2vw, 12px); font-weight: 600; color: #666;">Trend lines
                        </div>
                        <div class="selector-group">
                            <button class="selector-button line-btn" data-line="0">Regression</button>
                            <button class="selector-button line-btn active" data-line="1">Frontier</button>
                        </div>
                    </div>
                </div>
                <div style="display: flex; flex-direction: row; align-items: center; gap: 8px;">
                    <div style="font-size: clamp(10px, 1.2vw, 12px); font-weight: 600; color: #666;">Color by</div>
                    <div class="selector-group">
                        <button class="selector-button" data-palette="0">Org</button>
                        <button class="selector-button active" data-palette="1">Licensing</button>
                        <button class="selector-button" data-palette="2">Country</button>
                    </div>
                </div>
            </div>
        </div>
        <div id="container1" class="container chart-container">
            <div class="chart-wrapper">
                <div class="chart-wrapper-inner">
                    <svg id="chart"></svg>
                </div>
            </div>
        </div>
        <div id="container3" class="container source-container">
            <div class="source-text">Source: <a href="https://aiworld.eu" target="_blank">AI World</a></div>
        </div>
        <div id="container4" class="container logo-container">
            <a href="https://aiworld.eu/" target="_blank" rel="noopener">
                <img src="https://aiworld.eu/logo-transparent.svg" class="logo" alt="AI World logo">
            </a>
        </div>
        <div id="footnote-container"></div>
    </div>
    <div id="tooltip"></div>
    <script>
        const tooltip = d3.select("#tooltip");
        const DATA_BASE = (LB.config && LB.config.dataBase) || ".";
        const CONFIG_BASE = (LB.config && LB.config.configBase) || DATA_BASE;
        let rawData = [];
        let lastTrackedScores = {};
        let trackingMap = {};
        let modelIcons = {};
        let modelColors = {};
        let modelToOs = {};
        let modelToLogo = {};
        let modelToOrg = {};
        let modelToDeactivated = {};
        let modelToGeo = {};
        let modelToReleaseDate = {};
        let modelToCost = {};
        let idToColor = {};
        let idToOrg = {};
        let activeOsFilter = null;
        let hiddenGeos = [];
        let active = { question: 'ALL' };
        let modeParam = 0;
        let lineMode = 1; // 0 = regression, 1 = frontier staircase
        let paletteMode = 1;
        // ?view= date (default) | cost — which field the X axis plots
        let xMode = (new URLSearchParams(location.search).get('view') || 'date').toLowerCase() === 'cost' ? 1 : 0;
        // ?xaxis= log (d3 natural $ ticks, default) | even (evenly-spaced log ticks) | linear (linear positions)
        const xAxisScale = (new URLSearchParams(location.search).get('xaxis') || 'even').toLowerCase();
        let bgColor = '#ffffff';
        let displayMode = 0;
        let ignoreDeact = false;
        let skippedNoX = 0;
        let resizeTimer = null;
        let chartLayers = null;

        const TRANSITION_MS = 400;
        const GEO_TRENDLINE_COLORS = { 'US': '#3b82f6', 'China': '#ef4444', 'France': '#5c5a74' };

        const parseNum = LB.util.parseNum;
        const displayName = LB.util.displayName;

        function load() {
            const query = LB.vizControls.readQuery({
                paletteDefault: paletteMode,
                paletteValues: [0, 1, 2],
                sourceDefault: active.question,
                colorDefault: bgColor,
                bopDefault: modeParam,
                displayDefault: displayMode
            });

            LB.loadData({ dataBase: DATA_BASE, configBase: CONFIG_BASE }).then(state => {
                rawData = state.rawData;
                lastTrackedScores = state.lastTrackedScores;
                modelToOs = state.modelToOs;
                modelToGeo = state.modelToGeo;
                modelToReleaseDate = state.modelToReleaseDate;
                modelToCost = state.modelToCost || {};
                modelToLogo = state.modelToLogo;
                modelToOrg = state.modelToOrg;
                modelToDeactivated = state.modelToDeactivated || {};
                modelIcons = state.modelIcons;
                idToColor = state.idToColor;
                idToOrg = state.idToOrg;
                trackingMap = state.trackingMap;

                paletteMode = query.palette;
                rawData.forEach(d => assignColor(d));

                active.question = query.source;
                LB.vizControls.setActiveTab(active.question);
                modeParam = query.bop;
                bgColor = query.color;
                ignoreDeact = query.ignoreDeact;
                displayMode = query.display;
                LB.vizControls.applyPageChrome({ bgColor, logo: query.logo, displayMode: query.display });

                setupTabs();
                setupXButtons();
                setupLineButtons();
                setupPaletteButtons();
                if (window.ModelFilter) {
                    window.ModelFilter.init({
                        getModels: () => rawData
                            .map(d => {
                                const m = String(d.model || '').trim();
                                return {
                                    model: m,
                                    name: String(d.name || '').trim(),
                                    color: modelColors[m] || '#2756d3',
                                    _rd: modelToReleaseDate[m] || null
                                };
                            })
                            .sort((a, b) => {
                                if (a._rd && b._rd) return b._rd - a._rd;
                                if (a._rd) return -1;
                                if (b._rd) return 1;
                                return (a.name || a.model).localeCompare(b.name || b.model);
                            }),
                        onChange: () => updateChart()
                    });

                    const toHide = frontierDefaultHidden();
                    if (toHide.length) window.ModelFilter.setHidden(toHide);
                }
                renderLegend();

                updateChart();
                window.addEventListener('resize', () => {
                    if (resizeTimer) clearTimeout(resizeTimer);
                    resizeTimer = setTimeout(updateChart, 100);
                });
            });
        }

        function assignColor(d) {
            const model = String(d.model || '').trim();
            const logo = String(d.logo || '').trim();
            if (paletteMode === 1) {
                const os = modelToOs[model] !== undefined ? modelToOs[model] : 0;
                modelColors[model] = os === 1 ? '#188ab2' : '#ef476f';
            } else if (paletteMode === 2) {
                const geo = modelToGeo[model] || 'Other';
                if (geo === 'US') modelColors[model] = '#3b82f6';
                else if (geo === 'China') modelColors[model] = '#ef4444';
                else if (geo === 'France') modelColors[model] = '#5c5a74';
                else modelColors[model] = '#cccccc';
            } else if (logo && idToColor[logo]) {
                modelColors[model] = idToColor[logo];
            } else {
                modelColors[model] = '#1a73e8';
            }
        }

        function isDeactivated(model) {
            return !!(modelToDeactivated && modelToDeactivated[model]);
        }

        function isDeactivationActive(model) {
            return !ignoreDeact && isDeactivated(model);
        }

        function chartColor(model) {
            return (paletteMode === 0 && isDeactivationActive(model)) ? LB.tooltip.deactivatedColor : (modelColors[model] || '#1a73e8');
        }

        function setupTabs() {
            LB.vizControls.setupTabs({
                value: active.question,
                onChange: question => {
                    active.question = question;
                    if (window.ModelFilter) {
                        window.ModelFilter.setHidden(frontierDefaultHidden());
                        window.ModelFilter.refresh();
                    }
                    updateChart();
                }
            });
        }

        function setupXButtons() {
            LB.vizControls.setupValueButtons({
                selector: '.x-btn',
                attr: 'data-x',
                value: xMode,
                onChange: val => {
                    xMode = val;
                    updateChart();
                }
            });
        }

        function setupLineButtons() {
            LB.vizControls.setupValueButtons({
                selector: '.line-btn',
                attr: 'data-line',
                value: lineMode,
                onChange: val => {
                    lineMode = val;
                    updateChart();
                }
            });
        }

        function setupPaletteButtons() {
            LB.vizControls.setupValueButtons({
                selector: '[data-palette]',
                attr: 'data-palette',
                value: paletteMode,
                onChange: val => {
                    paletteMode = val;
                    rawData.forEach(d => assignColor(d));
                    if (window.ModelFilter) {
                        window.ModelFilter.setHidden(frontierDefaultHidden());
                        window.ModelFilter.refresh();
                    }
                    updateChart();
                    renderLegend();
                }
            });
        }

        function getAggregated(opts) {
            return LB.aggregate({
                rawData,
                lastTrackedScores,
                modelToGeo,
                modelToOs,
                modelToDeactivated,
                modelToLogo,
                active,
                hiddenGeos,
                activeOsFilter,
                modeParam,
                includeSegments: false,
                ignoreModelFilter: !!(opts && opts.ignoreModelFilter)
            });
        }

        function getPlotData() {
            const agg = getAggregated();
            const costMode = xMode === 1;
            let withoutX = 0;
            const data = agg.map(d => {
                const release = modelToReleaseDate[d.model];
                const cost = modelToCost[d.model];
                const xv = costMode ? cost : release;
                if (xv == null) { withoutX++; return null; }
                return {
                    model: d.model,
                    name: d.name || d.model,
                    score: d.score,
                    date: release || null,
                    cost: cost != null ? cost : null,
                    xv,
                    geo: modelToGeo[d.model] || 'Other',
                    color: chartColor(d.model),
                    logo: modelToLogo[d.model] || '',
                    os: modelToOs[d.model] !== undefined ? modelToOs[d.model] : 0,
                    untracked: !!d.untracked,
                    deactivated: isDeactivationActive(d.model)
                };
            }).filter(Boolean);
            skippedNoX = withoutX;
            return data;
        }

        function frontierGroupKey(model) {
            if (paletteMode === 1) return modelToOs[model] === 1 ? 'os' : 'prop';
            if (paletteMode === 2) return modelToGeo[model] || 'Other';
            return modelToLogo[model] || 'other';
        }

        function frontierDefaultHidden() {
            const agg = getAggregated({ ignoreModelFilter: true });
            const frontier = LB.computeFrontier(agg.map(d => ({
                model: d.model,
                score: d.score,
                date: modelToReleaseDate[d.model] || null,
                group: frontierGroupKey(d.model)
            })));
            return agg.map(d => d.model).filter(m => !frontier.has(m));
        }

        function trendlineGroupKey(d) {
            if (paletteMode === 0) return d.logo || 'other';
            if (paletteMode === 1) return d.os === 1 ? 'os' : 'prop';
            return d.geo;
        }

        function trendlineGroupColor(key) {
            if (paletteMode === 0) return idToColor[key] || '#9ca3af';
            if (paletteMode === 1) return key === 'os' ? '#188ab2' : '#ef476f';
            return GEO_TRENDLINE_COLORS[key] || '#9ca3af';
        }

        function xNum(p) {
            return p.xv instanceof Date ? p.xv.getTime() : p.xv;
        }

        function linearRegression(points) {
            const n = points.length;
            if (n < 2) return null;
            let sumX = 0, sumY = 0, sumXY = 0, sumXX = 0;
            points.forEach(p => {
                const x = xNum(p);
                sumX += x; sumY += p.score; sumXY += x * p.score; sumXX += x * x;
            });
            const denom = (n * sumXX - sumX * sumX);
            if (denom === 0) return null;
            const slope = (n * sumXY - sumX * sumY) / denom;
            const intercept = (sumY - slope * sumX) / n;
            return { slope, intercept };
        }

        function getValueFormatter() {
            if (active.question === 'ALL') return d3.format('.3f');
            if (active.question === 'LiveBench') return d3.format('.1f');
            return d3.format('.0f');
        }

        function getYAxisTitle() {
            if (active.question === 'ALL') return 'Capability Score (normalized)';
            if (active.question === 'LMArena') return 'LMArena Elo';
            if (active.question === 'Artificial Analysis') return 'Artificial Analysis Index';
            if (active.question === 'LiveBench') return 'LiveBench Score';
            return 'Score';
        }

        function getChartTitle() {
            const axis = xMode === 1 ? 'by Cost' : 'over Time';
            if (active.question === 'ALL') return `AI Capability ${axis}`;
            return `${active.question} ${axis}`;
        }

        function getXAxisTitle() {
            if (xMode !== 1) return 'Released';
            const prefix = (xAxisScale === 'log' || xAxisScale === 'even') ? 'Log of ' : '';
            return `${prefix}Output cost ($ / 1M tokens)`;
        }

        function ensureLayers() {
            const svg = d3.select('#chart');
            if (chartLayers && chartLayers.svgNode === svg.node()) return chartLayers;
            svg.selectAll('*').remove();
            const defs = svg.append('defs');
            const halo = defs.append('filter').attr('id', 'label-halo')
                .attr('x', '-30%').attr('y', '-30%').attr('width', '160%').attr('height', '160%');
            halo.append('feMorphology').attr('in', 'SourceAlpha').attr('operator', 'dilate').attr('radius', 2).attr('result', 'thick');
            halo.append('feGaussianBlur').attr('in', 'thick').attr('stdDeviation', 1.8).attr('result', 'blurred');
            halo.append('feFlood').attr('flood-color', bgColor || '#ffffff').attr('flood-opacity', 0.85).attr('result', 'bg');
            halo.append('feComposite').attr('in', 'bg').attr('in2', 'blurred').attr('operator', 'in').attr('result', 'haloShape');
            const haloMerge = halo.append('feMerge');
            haloMerge.append('feMergeNode').attr('in', 'haloShape');
            haloMerge.append('feMergeNode').attr('in', 'SourceGraphic');
            const root = svg.append('g').attr('class', 'plot-area');
            chartLayers = {
                svgNode: svg.node(),
                svg: svg,
                root,
                gridY: root.append('g').attr('class', 'axis-grid grid-y'),
                gridX: root.append('g').attr('class', 'axis-grid grid-x'),
                axisX: root.append('g').attr('class', 'axis axis-x'),
                axisY: root.append('g').attr('class', 'axis axis-y'),
                quadrant: root.append('g').attr('class', 'quadrant-lines'),
                trendlines: root.append('g').attr('class', 'trendlines'),
                labelLines: root.append('g').attr('class', 'label-lines'),
                dots: root.append('g').attr('class', 'dots'),
                untrackedMarks: root.append('g').attr('class', 'untracked-marks'),
                labels: root.append('g').attr('class', 'labels'),
                xLabel: svg.append('text').attr('class', 'axis-label x-label').attr('text-anchor', 'middle'),
                yLabel: svg.append('text').attr('class', 'axis-label y-label').attr('text-anchor', 'middle'),
                notice: svg.append('text').attr('class', 'notice')
                    .attr('font-size', 10).attr('font-style', 'italic').attr('fill', '#888')
                    .attr('text-anchor', 'end').style('opacity', 0),
                empty: svg.append('text').attr('class', 'empty-state')
                    .attr('text-anchor', 'middle').attr('fill', '#666').attr('font-size', 14)
                    .style('opacity', 0)
            };
            return chartLayers;
        }

        function updateChart() {
            const container = document.getElementById('container1');
            const width = container.clientWidth;
            const height = container.clientHeight;
            if (width <= 0 || height <= 0) return;

            const layers = ensureLayers();
            const svg = layers.svg;
            svg.attr('width', width).attr('height', height).attr('viewBox', `0 0 ${width} ${height}`);

            const t = d3.transition('chart').duration(TRANSITION_MS).ease(d3.easeCubicOut);
            const data = getPlotData();

            if (data.length === 0) {
                const field = xMode === 1 ? 'cost_output' : 'release_date';
                const msg = skippedNoX > 0
                    ? `No models have a ${field} set in tracking.json (${skippedNoX} skipped)`
                    : 'No data';
                layers.empty
                    .attr('x', width / 2).attr('y', height / 2)
                    .text(msg)
                    .transition(t).style('opacity', 1);
                layers.root.transition(t).style('opacity', 0);
                layers.notice.transition(t).style('opacity', 0);
                return;
            }
            layers.empty.transition(t).style('opacity', 0);
            layers.root.transition(t).style('opacity', 1);

            const margin = { top: 28, right: 110, bottom: 60, left: 80 };
            const innerW = Math.max(50, width - margin.left - margin.right);
            const innerH = Math.max(50, height - margin.top - margin.bottom);

            layers.root.attr('transform', `translate(${margin.left},${margin.top})`);
            layers.gridX.attr('transform', `translate(0,${innerH})`);
            layers.axisX.attr('transform', `translate(0,${innerH})`);

            layers.xLabel
                .attr('x', margin.left + innerW / 2).attr('y', height - 18)
                .text(getXAxisTitle());
            layers.yLabel
                .attr('transform', `translate(20,${margin.top + innerH / 2}) rotate(-90)`)
                .text('Score');

            const costMode = xMode === 1;

            // trend lines are meaningless over cost — disable + gray their controls in cost mode
            const trendCtrl = document.getElementById('trend-control');
            if (trendCtrl) trendCtrl.style.opacity = costMode ? '0.4' : '';
            document.querySelectorAll('.line-btn').forEach(b => { b.disabled = costMode; });

            let x;
            if (costMode) {
                const xExtent = d3.extent(data, d => d.xv);
                const lo = Math.max(xExtent[0], 0.01);
                const hi = Math.max(xExtent[1], lo * 1.01);
                x = xAxisScale === 'linear'
                    ? d3.scaleLinear().domain([0, hi * 1.05]).range([0, innerW])
                    : d3.scaleLog().domain([lo / 1.4, hi * 1.4]).range([0, innerW]);
            } else {
                const xExtent = d3.extent(data, d => d.xv);
                const xPad = Math.max(15 * 86400000, (xExtent[1] - xExtent[0]) * 0.05);
                const xDomain = [new Date(xExtent[0].getTime() - xPad), new Date(xExtent[1].getTime() + xPad)];
                x = d3.scaleTime().domain(xDomain).range([0, innerW]);
            }
            const px = d => x(d.xv);

            const yExtent = d3.extent(data, d => d.score);
            const yRange = yExtent[1] - yExtent[0];
            const initialPad = Math.max(yRange * 0.10, yRange === 0 ? 1 : 0);
            const niceScale = d3.scaleLinear().domain([yExtent[0] - initialPad, yExtent[1] + initialPad]).nice();
            const niceLower = niceScale.domain()[0];
            const bottomPad = yExtent[0] - niceLower;
            const upperBound = yExtent[1] + bottomPad;
            const y = d3.scaleLinear().domain([niceLower, upperBound]).range([innerH, 0]);

            const fmt = getValueFormatter();

            layers.gridY.transition(t).call(d3.axisLeft(y).tickSize(-innerW).tickFormat(''));
            layers.gridY.selectAll('line').attr('stroke', '#e5e7eb');
            layers.gridY.select('.domain').attr('stroke', 'none');

            const xTickCount = Math.max(4, Math.floor(innerW / 110));
            const costFmt = v => '$' + (v < 1 ? d3.format('.2~f')(v) : d3.format('~r')(v));
            const evenFmt = v => '$' + (v < 1 ? d3.format('.1~f')(v) : d3.format('.2~r')(v));

            // configure x ticks/grid per mode: time, evenly-spaced-log, linear, or natural log
            let setXTicks;
            if (!costMode) {
                setXTicks = ax => ax.ticks(xTickCount).tickFormat(d3.timeFormat('%b %Y'));
            } else if (xAxisScale === 'even') {
                const [d0, d1] = x.domain();
                const tv = d3.range(xTickCount + 1).map(i => d0 * Math.pow(d1 / d0, i / xTickCount));
                setXTicks = ax => ax.tickValues(tv).tickFormat(evenFmt);
            } else if (xAxisScale === 'linear') {
                setXTicks = ax => ax.ticks(xTickCount).tickFormat(costFmt);
            } else {
                setXTicks = ax => ax.ticks(xTickCount, '~r').tickFormat(costFmt);
            }

            layers.gridX.transition(t).call(setXTicks(d3.axisBottom(x)).tickSize(-innerH).tickFormat(''));
            layers.gridX.selectAll('line').attr('stroke', '#e5e7eb');
            layers.gridX.select('.domain').attr('stroke', 'none');

            layers.axisX.transition(t).call(setXTicks(d3.axisBottom(x)));
            layers.axisX.selectAll('text').attr('font-size', 11).attr('fill', '#374151');
            layers.axisX.select('.domain').attr('stroke', '#9ca3af');

            layers.axisY.transition(t).call(d3.axisLeft(y).ticks(8).tickFormat(fmt));
            layers.axisY.selectAll('text').attr('font-size', 11).attr('fill', '#374151');
            layers.axisY.select('.domain').attr('stroke', '#9ca3af');

            // cost mode replaces trend lines with quadrant divider lines
            const trendData = [];
            if (!costMode) {
                const stepLine = d3.line().x(p => x(p.xv)).y(p => y(p.score)).curve(d3.curveStepAfter);
                const groups = d3.group(data, d => trendlineGroupKey(d));
                groups.forEach((pts, key) => {
                    if (pts.length < 2) return;
                    let path;
                    if (lineMode === 1) {
                        const sorted = pts.slice().sort((a, b) => xNum(a) - xNum(b));
                        let max = -Infinity;
                        const records = [];
                        sorted.forEach(p => { if (p.score > max) { max = p.score; records.push({ xv: p.xv, score: p.score }); } });
                        const lastXv = sorted[sorted.length - 1].xv;
                        const lr = records[records.length - 1];
                        if (xNum(lr) < xNum({ xv: lastXv })) records.push({ xv: lastXv, score: lr.score });
                        if (records.length < 2) return;
                        path = stepLine(records);
                    } else {
                        const reg = linearRegression(pts);
                        if (!reg) return;
                        const xMin = d3.min(pts, xNum);
                        const xMax = d3.max(pts, xNum);
                        const toX = v => x(costMode ? v : new Date(v));
                        path = `M ${toX(xMin)} ${y(reg.slope * xMin + reg.intercept)} L ${toX(xMax)} ${y(reg.slope * xMax + reg.intercept)}`;
                    }
                    trendData.push({ key, color: trendlineGroupColor(key), path, dash: lineMode === 1 ? 'none' : null });
                });
            }

            const quadData = costMode ? [
                { k: 'v', x1: x(d3.mean(data, d => d.xv)), y1: 0, x2: x(d3.mean(data, d => d.xv)), y2: innerH },
                { k: 'h', x1: 0, y1: y(d3.mean(data, d => d.score)), x2: innerW, y2: y(d3.mean(data, d => d.score)) }
            ] : [];
            const quadSel = layers.quadrant.selectAll('line').data(quadData, d => d.k);
            quadSel.exit().transition(t).style('opacity', 0).remove();
            const quadEnter = quadSel.enter().append('line').attr('class', 'quadrant-line')
                .attr('x1', d => d.x1).attr('y1', d => d.y1).attr('x2', d => d.x2).attr('y2', d => d.y2)
                .style('opacity', 0);
            quadEnter.merge(quadSel).transition(t)
                .attr('x1', d => d.x1).attr('y1', d => d.y1).attr('x2', d => d.x2).attr('y2', d => d.y2)
                .style('opacity', 0.7);

            const trendSel = layers.trendlines.selectAll('path').data(trendData, d => d.key);
            trendSel.exit().transition(t).style('opacity', 0).remove();
            const trendEnter = trendSel.enter().append('path').attr('class', 'trendline')
                .attr('d', d => d.path)
                .attr('stroke', d => d.color)
                .attr('stroke-dasharray', d => d.dash)
                .style('opacity', 0);
            trendEnter.merge(trendSel)
                .attr('stroke-dasharray', d => d.dash)
                .transition(t)
                .attr('d', d => d.path)
                .attr('stroke', d => d.color)
                .style('opacity', 0.85);

            const labelObjs = data.map(d => ({
                ...d,
                x0: px(d),
                y0: y(d.score),
                lx: px(d) + 8,
                ly: y(d.score)
            }));
            resolveLabelCollisions(labelObjs, innerH);

            const dotR = Math.max(3.5, Math.min(6, innerW / 200));

            const labelLineData = labelObjs.filter(d => Math.abs(d.ly - d.y0) > 6);
            const llSel = layers.labelLines.selectAll('line').data(labelLineData, d => d.model);
            llSel.exit().transition(t).style('opacity', 0).remove();
            const llEnter = llSel.enter().append('line').attr('class', 'label-line')
                .attr('x1', d => d.x0).attr('y1', d => d.y0)
                .attr('x2', d => d.lx - 2).attr('y2', d => d.ly)
                .attr('stroke', d => d.color)
                .attr('stroke-width', 0.8)
                .style('opacity', 0);
            llEnter.merge(llSel)
                .transition(t)
                .attr('x1', d => d.x0).attr('y1', d => d.y0)
                .attr('x2', d => d.lx - 2).attr('y2', d => d.ly)
                .attr('stroke', d => d.color)
                .style('opacity', 0.5);

            const isAll = active.question === 'ALL';
            const untrackedR = dotR + 2;
            const radiusFor = d => (d.untracked && !isAll) ? untrackedR : dotR;

            const dotSel = layers.dots.selectAll('circle').data(data, d => d.model);
            dotSel.exit().transition(t).attr('r', 0).style('opacity', 0).remove();
            const dotEnter = dotSel.enter().append('circle')
                .attr('class', 'scatter-dot')
                .attr('cx', d => px(d))
                .attr('cy', d => y(d.score))
                .attr('r', 0)
                .attr('fill', d => d.color)
                .attr('stroke', '#fff')
                .attr('stroke-width', 1.2)
                .style('opacity', 0);
            dotEnter.merge(dotSel)
                .transition(t)
                .attr('cx', d => px(d))
                .attr('cy', d => y(d.score))
                .attr('fill', d => d.color)
                .attr('r', radiusFor)
                .style('opacity', 1);

            const markData = isAll ? [] : data.filter(d => d.untracked);
            const markSel = layers.untrackedMarks.selectAll('text').data(markData, d => d.model);
            markSel.exit().transition(t).style('opacity', 0).remove();
            const markEnter = markSel.enter().append('text')
                .attr('class', 'untracked-mark')
                .attr('text-anchor', 'middle')
                .attr('dominant-baseline', 'central')
                .attr('fill', '#fff')
                .attr('font-weight', '700')
                .attr('pointer-events', 'none')
                .attr('x', d => px(d))
                .attr('y', d => y(d.score))
                .style('opacity', 0)
                .text('!');
            markEnter.merge(markSel)
                .attr('font-size', Math.round(untrackedR * 1.6) + 'px')
                .text('!')
                .transition(t)
                .attr('x', d => px(d))
                .attr('y', d => y(d.score))
                .style('opacity', 1);

            const renderCell = (model, key, currentScore, formatter, estimate) =>
                LB.tooltip.renderScoreCell(model, key, currentScore, formatter, lastTrackedScores, estimate);

            layers.dots.selectAll('circle')
                .on('mouseover', function (event, d) {
                    d3.select(this).interrupt().attr('r', radiusFor(d) + 2);
                    const org = modelToOrg[d.model];
                    const head = `<div style="text-align:center;margin-bottom:4px;"><b>${d.name}</b>${org ? '<br><span style="font-size:0.9em;">' + org + '</span>' : ''}</div>`;
                    let body;
                    let anyUntracked = false;
                    let anyEstimated = false;
                    const relRow = d.date
                        ? `<tr><td style="text-align:left;padding:2px 8px 2px 0;">Released</td><td style="text-align:right;padding:2px 0;">${d3.timeFormat('%b %d, %Y')(d.date)}</td></tr>`
                        : '';
                    const costRow = d.cost != null
                        ? `<tr><td style="text-align:left;padding:2px 8px 2px 0;">Output cost</td><td style="text-align:right;padding:2px 0;">$${d.cost} / 1M</td></tr>`
                        : '';
                    if (isAll) {
                        const rawEntry = rawData.find(r => String(r.model || '').trim() === d.model);
                        const lmaScore = rawEntry ? parseNum(rawEntry.lma) : 0;
                        const aaScore = rawEntry ? parseNum(rawEntry.aa) : 0;
                        const lbScore = rawEntry ? parseNum(rawEntry.lb) : 0;
                        const est = d.estimates || {};
                        const lmaCell = renderCell(d.model, 'lma', lmaScore, v => Math.round(v), est.lma);
                        const aaCell = renderCell(d.model, 'aa', aaScore, v => v.toFixed(1), est.aa);
                        const lbCell = renderCell(d.model, 'lb', lbScore, v => v.toFixed(1), est.lb);
                        anyUntracked = lmaCell.untracked || aaCell.untracked || lbCell.untracked;
                        anyEstimated = lmaCell.estimated || aaCell.estimated || lbCell.estimated;
                        body = `<table style="width:100%;margin-top:4px;border-spacing:0;">`
                            + `<tr><td style="text-align:left;padding:2px 8px 2px 0;">Score</td><td style="text-align:right;padding:2px 0;">${fmt(d.score)}</td></tr>`
                            + `<tr><td style="text-align:left;padding:2px 8px 2px 0;">LMArena</td><td style="text-align:right;padding:2px 0;">${lmaCell.html}</td></tr>`
                            + `<tr><td style="text-align:left;padding:2px 8px 2px 0;">Artificial Analysis</td><td style="text-align:right;padding:2px 0;">${aaCell.html}</td></tr>`
                            + `<tr><td style="text-align:left;padding:2px 8px 2px 0;">LiveBench</td><td style="text-align:right;padding:2px 0;">${lbCell.html}</td></tr>`
                            + relRow + costRow
                            + `</table>`;
                    } else {
                        const scoreCell = d.untracked
                            ? `<span style="color:#888;">${fmt(d.score)}</span> ${LB.tooltip.badgeHtml}`
                            : fmt(d.score);
                        anyUntracked = !!d.untracked;
                        body = `<table style="width:100%;margin-top:4px;border-spacing:0;">`
                            + `<tr><td style="text-align:left;padding:2px 8px 2px 0;">Score</td><td style="text-align:right;padding:2px 0;">${scoreCell}</td></tr>`
                            + relRow + costRow
                            + `</table>`;
                    }
                    const note = (anyUntracked ? LB.tooltip.disclaimerHtml : '')
                        + (anyEstimated ? LB.tooltip.estimatedDisclaimerHtml : '')
                        + (d.deactivated ? LB.tooltip.deactivatedDisclaimerHtml : '');
                    tooltip.style('opacity', 1).html(head + body + note);
                    LB.tooltip.position(tooltip, event);
                })
                .on('mousemove', function (event) {
                    LB.tooltip.position(tooltip, event);
                })
                .on('mouseout', function (event, d) {
                    d3.select(this).interrupt().attr('r', radiusFor(d));
                    tooltip.style('opacity', 0);
                });

            const labelSel = layers.labels.selectAll('text').data(labelObjs, d => d.model);
            labelSel.exit().transition(t).style('opacity', 0).remove();
            const labelEnter = labelSel.enter().append('text')
                .attr('class', 'scatter-label')
                .attr('filter', 'url(#label-halo)')
                .attr('x', d => d.lx).attr('y', d => d.ly)
                .attr('dy', '0.32em')
                .attr('fill', d => d.deactivated ? LB.tooltip.deactivatedColor : d.color)
                .style('font-style', d => d.deactivated ? 'italic' : null)
                .style('opacity', 0)
                .text(d => d.deactivated ? `! ${displayName(d.name)}` : displayName(d.name));
            labelEnter.merge(labelSel)
                .text(d => d.deactivated ? `! ${displayName(d.name)}` : displayName(d.name))
                .each(function (d) {
                    const text = d3.select(this);
                    text.selectAll('title').remove();
                    if (d.deactivated) text.append('title').text('This model got deactivated.');
                })
                .transition(t)
                .attr('x', d => d.lx).attr('y', d => d.ly)
                .attr('fill', d => d.deactivated ? LB.tooltip.deactivatedColor : d.color)
                .style('font-style', d => d.deactivated ? 'italic' : null)
                .style('opacity', 1);

            layers.notice.transition(t).style('opacity', 0);
        }

        function resolveLabelCollisions(labels, height) {
            const minDy = 13;
            const xWindow = 70;
            labels.sort((a, b) => a.y0 - b.y0);
            for (let pass = 0; pass < 30; pass++) {
                let moved = false;
                for (let i = 0; i < labels.length; i++) {
                    for (let j = i + 1; j < labels.length; j++) {
                        const a = labels[i], b = labels[j];
                        if (Math.abs(a.lx - b.lx) > xWindow) continue;
                        const dy = b.ly - a.ly;
                        if (Math.abs(dy) < minDy) {
                            const need = (minDy - Math.abs(dy)) / 2 + 0.1;
                            if (dy >= 0) { a.ly -= need; b.ly += need; }
                            else { a.ly += need; b.ly -= need; }
                            moved = true;
                        }
                    }
                }
                if (!moved) break;
            }
            labels.forEach(d => { d.ly = Math.max(6, Math.min(height - 6, d.ly)); });
        }

        function renderLegend() {
            LB.vizControls.renderFilterLegend({
                container: document.getElementById('footnote-container'),
                paletteMode,
                activeOsFilter,
                hiddenGeos,
                geoColors: { US: '#3b82f6', China: '#ef4444', France: '#5c5a74' },
                onChange: state => {
                    activeOsFilter = state.activeOsFilter;
                    hiddenGeos = state.hiddenGeos;
                    updateChart();
                    renderLegend();
                }
            });
        }

        load();
    </script>
</body>
