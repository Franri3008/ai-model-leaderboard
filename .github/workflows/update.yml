name: Update Leaderboard Data

on:
  schedule:
    - cron: '0 23 * * *'
  push:
    branches: [main]
    paths:
      - 'config/tracking.json'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run update script
        env:
          FIREBASE_DATABASE_URL: ${{ secrets.FIREBASE_DATABASE_URL }}
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
        run: python update.py

      - name: Build email subject
        id: subj
        if: always() && hashFiles('metadata.json') != ''
        run: |
          S=$(python -c "import json; a=json.load(open('metadata.json'))['alerts_summary']; print(a['send_email'], a['new_untracked_models'], a['new_tracking_issues'])")
          read SEND NEW NEWTRACK <<< "$S"
          echo "send=$SEND" >> "$GITHUB_OUTPUT"
          echo "subject=Leaderboard $(date -u +%Y-%m-%d) — ${NEW} new untracked, ${NEWTRACK} dropped from tracking" >> "$GITHUB_OUTPUT"

      - name: Email the alerts
        if: always() && steps.subj.outputs.send == 'True' && hashFiles('alerts.html') != ''
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.MAIL_SERVER }}
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          from: AI Leaderboard Bot <${{ secrets.MAIL_USERNAME }}>
          to: ${{ secrets.ALERT_RECIPIENT }}
          subject: ${{ steps.subj.outputs.subject || 'Leaderboard daily alerts' }}
          html_body: file://alerts.html
          body: file://alerts.txt
          convert_markdown: false
